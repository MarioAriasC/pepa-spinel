AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

Style/OneClassPerFile:
  Enabled: false

Style/Documentation:
  Enabled: false

Lint/DeprecatedConstants:
  Enabled: false

Lint/MissingSuper:
  Exclude:
    - lib/past.rb

Metrics/MethodLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/BlockLength:
  Enabled: false